<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="A filtered temple album showcasing temples from around the world, filterable by age, size, and location." />
  <meta name="author" content="Naomi Oginni" />
  <title>Filtered Temple Album</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles/filtered-temples.css" />
  <script src="scripts/filtered-temples.js" defer></script>
</head>
<body>

  <header>
    <div class="header-inner">
      <h2 class="logo">Temple Album</h2>
      <button id="hamburger" aria-label="Toggle navigation" aria-expanded="false">&#9776;</button>
      <nav id="main-nav">
        <a href="#" data-filter="all">Home</a>
        <a href="#" data-filter="old">Old</a>
        <a href="#" data-filter="new">New</a>
        <a href="#" data-filter="large">Large</a>
        <a href="#" data-filter="small">Small</a>
      </nav>
    </div>
  </header>

  <main>
    <h1 id="filter-heading">Home</h1>
    <div class="gallery" id="gallery"></div>
  </main>

  <footer>
    <p>&copy;<span id="current-year"></span> 🌍 Naomi Oginni 🌍 Nigeria</p>
    <p>Last Modification: <span id="last-modified"></span></p>
  </footer>

</body>
</html>
