<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Thank you for submitting your product review. Your feedback helps others make informed decisions." />
  <meta name="author" content="Naomi Oginni" />
  <title>Review Submitted – Thank You!</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles/form.css" />
  <script src="scripts/form.js" defer></script>
</head>
<body class="confirmation-page">

  <header>
    <h1>Product Review</h1>
  </header>

  <main>
    <div class="confirmation-card">
      <div class="checkmark">&#10003;</div>
      <h2>Thank You!</h2>
      <p class="confirm-msg">Your review has been successfully submitted.</p>
      <div class="review-counter">
        <span class="counter-label">Total Reviews Submitted</span>
        <span class="counter-number" id="review-count">0</span>
      </div>
      <a href="form.html" class="back-btn">Submit Another Review</a>
    </div>
  </main>

  <footer>
    <p>&copy;<span id="current-year"></span> 🌍 Naomi Oginni 🌍 Nigeria</p>
    <p>Last Modification: <span id="last-modified"></span></p>
  </footer>

</body>
</html>
